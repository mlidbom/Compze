name: Create Releases

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (show what would happen without publishing)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: ${{ inputs.dry-run && 'Dry Run' || 'Publish' }}

    env:
      COMPOSABLE_MACHINE_SLOWNESS: "5.0"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag detection

      - name: Build and Test
        uses: ./.github/actions/build-and-test
        with:
          configuration: Release

      - name: Pack
        shell: pwsh
        run: |
          Import-Module ./DevScripts/Compze.psm1 -DisableNameChecking
          C-Pack -CI -NoBuild

      - name: Publish packages and create GitHub releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ inputs.dry-run && ' ' || secrets.NUGET_API_KEY }}
        run: |
          $dryRunFlag = @()
          if ('${{ inputs.dry-run }}' -eq 'true') { $dryRunFlag = @('-DryRun') }
          .github/scripts/Publish-NuGetWithReleases.ps1 @dryRunFlag -Verbose
