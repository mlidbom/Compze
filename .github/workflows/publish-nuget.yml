name: Publish NuGet Packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      COMPOSABLE_MACHINE_SLOWNESS: "5.0"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag detection

      - name: Build and Test
        uses: ./.github/actions/build-and-test
        with:
          configuration: Release

      - name: Pack
        shell: pwsh
        run: |
          Import-Module ./DevScripts/Compze.psm1 -DisableNameChecking
          C-Pack -CI

      - name: Publish packages and create GitHub releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: .github/scripts/Publish-NuGetWithReleases.ps1
