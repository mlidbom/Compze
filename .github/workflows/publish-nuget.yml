name: Create Releases

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: ${{ inputs.dry-run && 'Dry Run' || 'Publish' }}

    env:
      COMPOSABLE_MACHINE_SLOWNESS: "5.0"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag detection

      - name: Configure git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Build and Test
        uses: ./.github/actions/build-and-test
        with:
          configuration: Release

      - name: Pack
        shell: pwsh
        run: |
          Import-Module ./DevScripts/Compze.psm1 -DisableNameChecking
          C-Pack -CI -NoBuild

      - name: Publish packages and create GitHub releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ inputs.dry-run && '' || secrets.NUGET_API_KEY }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          if ($env:DRY_RUN -eq 'true') {
            .github/scripts/Publish-NuGetWithReleases.ps1 -DryRun -Verbose
          } else {
            .github/scripts/Publish-NuGetWithReleases.ps1 -Verbose
          }
