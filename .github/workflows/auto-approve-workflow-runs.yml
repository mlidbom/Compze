name: Auto Approve Workflow Runs

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/automatic-approve-action@v1
        with:
          token: ${{ secrets.AUTO_APPROVE_WORKFLOWS_PERSONAL_ACCESS_TOKEN }}
          workflows: "ci.yml"
