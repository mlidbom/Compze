name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "COMPOSABLE_MACHINE_SLOWNESS=5.0" >> "$GITHUB_ENV"
          echo "COMPOSABLE_PERFORMANCE_TESTS_STRESS_TEST_ONLY=true" >> "$GITHUB_ENV"
          echo "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> "$GITHUB_ENV"
          echo "DOTNET_NOLOGO=true" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Configure test pluggable components
        run: cp src/TestUsingPluggableComponentCombinations.github-ci src/TestUsingPluggableComponentCombinations

      - name: Build
        run: dotnet build src/Compze.AllProjects.slnx
