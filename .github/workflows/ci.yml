# Push CI: on every push to any branch, build and run the full pluggable-component matrix (the build-and-test job).
#
# Two independent de-duplication mechanisms keep interweaving branches from re-verifying the same work:
#   * concurrency (below), keyed on the branch ref, supersedes an in-flight run when the SAME branch is pushed again.
#   * the check-duplicate-commit job, keyed on the commit SHA, skips this run entirely when the SAME commit has already
#     triggered CI under another branch — the common case when several branches share a head commit and are pushed in
#     quick succession.
#
# Only the push trigger is used, deliberately: a pull_request trigger would double-verify every same-repo PR (once for
# the push event, once for the PR event) and — because github.sha on a PR event is the ephemeral merge commit, not the
# PR head — the SHA probe below cannot dedupe that pair. Every branch is already covered by push. Re-add pull_request
# only if CI must run on fork PRs (a fork's push fires in the fork, not here).

name: CI

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Skip this whole run when the same commit has already triggered CI under another branch. Interweaving branches often
  # share a head commit and get pushed in quick succession, which would otherwise verify the identical tree once per
  # branch. GitHub's concurrency feature cannot express this: its only modes are cancel-the-old-run or queue-the-new-one,
  # never drop-the-duplicate — so we probe the Actions run history for an EARLIER run of this workflow at this exact SHA.
  #
  # run_id is monotonic, so among all runs for one commit only the lowest-id (earliest-triggered) run finds no earlier
  # run and proceeds; every later run finds it and skips. The tie-break direction is deliberately safe: the only race is
  # an earlier run not yet visible in the API (a few seconds after trigger), which can cause an extra run but can NEVER
  # skip every run of a commit.
  #
  # This skips on TRIGGER, not on success: a failed or flaky first run is not auto-retried by a sibling branch's push
  # (the duplicates have already skipped). Re-run it manually, or push a new commit, to re-verify.
  check-duplicate-commit:
    name: Check for an earlier CI run of this commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      already_triggered: ${{ steps.probe.outputs.already_triggered }}
    steps:
      - id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A manual run (workflow_dispatch) is an explicit request to verify this commit again - the whole point is to
          # re-run a SHA that has already run - so it must never be deduped away. Only push-triggered duplicates are dropped.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "already_triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          earlier=$(gh api \
            "/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=100" \
            --jq "[.workflow_runs[] | select(.name == \"${{ github.workflow }}\" and .id < ${{ github.run_id }})] | length")
          if [ "$earlier" -gt 0 ]; then
            echo "already_triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_triggered=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    needs: check-duplicate-commit
    if: needs.check-duplicate-commit.outputs.already_triggered != 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        persistence: [SqliteMemory, Sqlite, PgSql, MySql, MsSql]
        di: [Microsoft, Autofac, DryIoc, LightInject]
        serializer: [Newtonsoft]
        transport: [AspNetCore, NamedPipes]

    name: "Test (${{ matrix.persistence }}:${{ matrix.di }}:${{ matrix.serializer }}:${{ matrix.transport }})"

    services:
      postgres:
        image: ${{ matrix.persistence == 'PgSql' && 'postgres:17' || '' }}
        env:
          POSTGRES_PASSWORD: "Development!1"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: ${{ matrix.persistence == 'MySql' && 'mysql:8' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: "Development!1"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mssql:
        image: ${{ matrix.persistence == 'MsSql' && 'mcr.microsoft.com/mssql/server:2022-latest' || '' }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Development!1"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Development!1' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Development!1' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      COMPOSABLE_MACHINE_SLOWNESS: "5.0"
      COMPOSABLE_PERFORMANCE_TESTS_STRESS_TEST_ONLY: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"
      COMPOSABLE_MSSQL_DATABASE_POOL_MASTER_CONNECTIONSTRING: ${{ matrix.persistence == 'MsSql' && 'Data Source=localhost;Initial Catalog=master;User Id=sa;Password=Development!1;TrustServerCertificate=True;' || '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Build and Test
        uses: ./.github/actions/build-and-test
        with:
          configuration: Debug
          pluggable-components: "${{ matrix.persistence }}:${{ matrix.di }}:${{ matrix.serializer }}:${{ matrix.transport }}"

  # Windows coverage for the container-free persistence layers. The DB engines run only on Linux because GitHub's service
  # containers (postgres/mysql/mssql images) cannot be hosted on a Windows runner, but SqliteMemory and Sqlite need no
  # container - so they run here to exercise the genuinely platform-divergent code CI otherwise never touches on Windows:
  # the named-pipe transport (Win32 kernel pipes vs the Unix-domain-socket emulation on Linux), the Sqlite process lock's
  # OS mutex, and Windows path / file-locking / line-ending handling. A separate job rather than an os matrix axis so the
  # services block above stays off Windows entirely.
  build-and-test-windows:
    needs: check-duplicate-commit
    if: needs.check-duplicate-commit.outputs.already_triggered != 'true'
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        persistence: [SqliteMemory, Sqlite]
        di: [Microsoft, Autofac, DryIoc, LightInject]
        serializer: [Newtonsoft]
        transport: [AspNetCore, NamedPipes]

    name: "Windows Test (${{ matrix.persistence }}:${{ matrix.di }}:${{ matrix.serializer }}:${{ matrix.transport }})"

    env:
      COMPOSABLE_MACHINE_SLOWNESS: "5.0"
      COMPOSABLE_PERFORMANCE_TESTS_STRESS_TEST_ONLY: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - uses: actions/checkout@v7

      - name: Build and Test
        uses: ./.github/actions/build-and-test
        with:
          configuration: Debug
          pluggable-components: "${{ matrix.persistence }}:${{ matrix.di }}:${{ matrix.serializer }}:${{ matrix.transport }}"
