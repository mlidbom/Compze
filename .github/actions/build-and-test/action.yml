name: Build and Test
description: Shared setup, build, and test steps for CI and publish workflows

inputs:
  configuration:
    description: Build configuration (Debug or Release)
    required: false
    default: Debug
  pluggable-components:
    description: "Pluggable component combination to test (e.g. SqliteMemory:Microsoft:Newtonsoft:AspNetCore). When not specified, uses the .github-ci config file."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Configure test pluggable components
      shell: bash
      run: |
        if [ -n "${{ inputs.pluggable-components }}" ]; then
          echo "${{ inputs.pluggable-components }}" > src/TestUsingPluggableComponentCombinations
        else
          cp src/TestUsingPluggableComponentCombinations.github-ci src/TestUsingPluggableComponentCombinations
        fi

    - name: Build
      shell: bash
      run: dotnet build Compze.AllProjects.slnx --configuration ${{ inputs.configuration }}

    - name: Test
      shell: bash
      run: |
        # Sample machine load throughout the test run, so a timeout can be checked against whether the box was actually
        # saturated. vmstat's `r` is the run-queue depth (threads wanting a CPU); `id` is idle CPU%. Against the runner's
        # logical-CPU count, sustained r far above it with id~0 is real oversubscription; r near or below it with idle to
        # spare is not - a timeout is then a code defect, not a starved machine. procps (vmstat) is preinstalled on ubuntu.
        vmstat -t 1 > vmstat-during-tests.log 2>&1 &
        vmstat_pid=$!

        set +e
        dotnet test Compze.AllProjects.slnx --configuration ${{ inputs.configuration }} --no-build -m:1
        test_exit=$?
        set -e

        kill "$vmstat_pid" 2>/dev/null || true

        echo "===== Machine load during the test run (vmstat) ====="
        nproc | sed 's/^/logical CPUs: /'
        # Only rows whose first field is a number are samples (skips both header lines); the first such row is the
        # since-boot average, skipped too. Column layout: 1=r (run queue), 15=id (idle%), 16=wa (iowait%). Peak/avg are
        # over the WHOLE run - the tail alone only shows the final, lightweight assembly, not the heavy phases.
        awk '$1 ~ /^[0-9]+$/ {
               n++
               if (n == 1) next
               if ($1 > peakr) peakr = $1
               if (minid == "" || $15 < minid) minid = $15
               if ($16 > peakwa) peakwa = $16
               rsum += $1; idsum += $15; c++
             }
             END {
               if (c > 0) printf "run-queue r: peak=%d avg=%.1f   idle CPU%%: min=%d avg=%.0f   iowait%% peak=%d   (%d samples)\n", peakr, rsum/c, minid, idsum/c, peakwa, c
               else print "no vmstat samples captured"
             }' vmstat-during-tests.log
        echo "----- busiest 10 samples by run-queue -----"
        awk '$1 ~ /^[0-9]+$/ && NR > 3' vmstat-during-tests.log | sort -k1,1 -nr | head -n 10

        exit $test_exit
